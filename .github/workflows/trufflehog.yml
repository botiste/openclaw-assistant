name: TruffleHog Scan
permissions:
  contents: read

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]
jobs:
  trufflehog:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Run truffleHog (filesystem scan)
        uses: docker://trufflesecurity/trufflehog@sha256:3af601f1c18e653fa05c18c652d61d2a624be7d037b927499f469d5ad3e18a11
        with:
          args: --json --no-color filesystem --directory . > trufflehog-report.json || true

      - name: Fail on trufflehog findings
        run: |
          if [ -f trufflehog-report.json ] && [ "$(jq -r '. | length' trufflehog-report.json)" != "0" ]; then
            echo "Secrets found by truffleHog:"; jq -r '.[] | "path: " + (.path // "") + " - reason: " + (.reason // "")' trufflehog-report.json || true
            exit 1
          fi